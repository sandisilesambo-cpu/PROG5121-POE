name: Java CI with Maven

on:
  push:
    branches: [ "main", "main" ]
  pull_request:
    branches: [ "main", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and run tests with Maven
        run: mvn --batch-mode test
