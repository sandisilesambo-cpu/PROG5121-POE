name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 20
        uses: actions/setup-java@v4
        with:
          java-version: '20'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn --batch-mode compile

      - name: Run tests
        run: mvn --batch-mode test

      - name: Show test results
        if: always()
        run: |
          echo "=== TEST RESULTS ==="
          find . -name "*.txt" -path "*/surefire-reports/*" | xargs cat 2>/dev/null || echo "No report files found"
